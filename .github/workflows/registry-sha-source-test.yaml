name: Registry SHA Source Behavior Test

on:
  push:
    paths:
      - 'registry-sha-test/**'
      - '.github/workflows/registry-sha-source-test.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-fork-owned-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push fork-owned universal-workbench image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./registry-sha-test
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/universal-workbench:registry-sha-test

      - name: Print fork image digest
        run: |
          echo "fork_image=ghcr.io/${{ github.repository_owner }}/universal-workbench:registry-sha-test"
          echo "fork_digest=${{ steps.build.outputs.digest }}"
